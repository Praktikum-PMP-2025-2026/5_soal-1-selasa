name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - radiasi tinggi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - radiasi tinggi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 371 6 10"
          expected-output: "TOLAK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 02 - suhu karantina
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - suhu karantina
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 390 1 10"
          expected-output: "KARANTINA"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 03 - izin satu jam terlalu pagi
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - izin satu jam terlalu pagi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1 370 0 5"
          expected-output: "TOLAK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 04 - izin satu normal
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - izin satu normal
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1 371 2 10"
          expected-output: "MASUK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 05 - izin dua lolos batas bawah jam
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - izin dua lolos batas bawah jam
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 371 2 8"
          expected-output: "MASUK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 06 - izin dua lolos batas atas jam
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - izin dua lolos batas atas jam
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 371 1 18"
          expected-output: "MASUK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 07 - izin dua pemeriksaan karena radiasi
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - izin dua pemeriksaan karena radiasi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 371 3 10"
          expected-output: "PEMERIKSAAN"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 08 - izin dua pemeriksaan karena jam
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - izin dua pemeriksaan karena jam
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 371 1 7"
          expected-output: "PEMERIKSAAN"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 09 - izin tiga lolos
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - izin tiga lolos
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 379 0 12"
          expected-output: "MASUK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Case 10 - izin tiga gagal
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - izin tiga gagal
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 380 0 12"
          expected-output: "TOLAK"
          comparison-method: exact
          timeout: 2
          max-score: 5

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
